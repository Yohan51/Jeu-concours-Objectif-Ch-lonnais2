<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket de retrait — L'Objectif Châlonnais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0A0A;
    --paper:#FCFCFB;
    --card:#FFFFFF;
    --muted:#6B6A66;
    --line:#E4E2DC;
    --line-strong:#D2D0C8;
    --sky:#3FAFE0;
    --sky-dark:#1E7FA8;
    --sky-tint:#E7F6FC;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:32px 16px 60px;
  }
  .wrap{width:100%;max-width:420px;}

  .masthead{
    text-align:center;
    margin-bottom:24px;
  }
  .masthead img{width:110px;height:auto;display:block;margin:0 auto 10px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--sky-dark);
    text-align:center;
  }

  .ticket{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 24px;
    text-align:center;
  }
  .viewfinder::before,.viewfinder::after,
  .viewfinder .vf-bl,.viewfinder .vf-br{
    content:"";
    position:absolute;
    width:16px;
    height:16px;
    border-color:var(--sky);
    border-style:solid;
    border-width:0;
  }
  .viewfinder::before{top:8px;left:8px;border-top-width:2px;border-left-width:2px;}
  .viewfinder::after{top:8px;right:8px;border-top-width:2px;border-right-width:2px;}
  .viewfinder .vf-bl{bottom:8px;left:8px;border-bottom-width:2px;border-left-width:2px;}
  .viewfinder .vf-br{bottom:8px;right:8px;border-bottom-width:2px;border-right-width:2px;}

  .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 6px;
  }
  .winner-name{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:30px;
    line-height:1.15;
    margin:0 0 20px;
    word-break:break-word;
  }
  .row{
    border-top:1px solid var(--line);
    padding:14px 0;
    text-align:left;
    display:flex;
    justify-content:space-between;
    gap:12px;
    font-size:14px;
  }
  .row:last-of-type{border-bottom:1px solid var(--line);}
  .row .k{color:var(--muted);}
  .row .v{font-weight:500;text-align:right;}

  .code-block{
    margin-top:20px;
    padding:16px;
    background:var(--sky-tint);
    border-radius:8px;
  }
  .code-block .label{color:var(--sky-dark);}
  .code-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:28px;
    font-weight:600;
    letter-spacing:.12em;
    color:var(--ink);
  }

  .status{
    margin-top:18px;
    font-size:12px;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .status .dot{width:7px;height:7px;border-radius:50%;background:#3F9142;display:inline-block;}

  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:#A8A69F;
    margin-top:24px;
    line-height:1.6;
    font-family:'IBM Plex Mono',monospace;
  }

  @media (max-width:380px){
    .winner-name{font-size:25px;}
    .code-value{font-size:24px;}
  }
</style>
</head>

  <div id="content"></div>

  <p class="footer-note" id="footerNote" style="display:none;">Présentez cet écran à l'équipe de L'Objectif Châlonnais pour retirer votre lot.</p>

<script>
  function esc(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const params = new URLSearchParams(window.location.search);
  const name = params.get('nom') || params.get('name') || '';
  const contest = params.get('concours') || params.get('contest') || '';
  const prize = params.get('lot') || params.get('prize') || '';
  const date = params.get('date') || '';
  const code = params.get('code') || '';

  const content = document.getElementById('content');
  const footerNote = document.getElementById('footerNote');

  if (!name && !code){
    content.innerHTML = `
      <div class="empty">
        Aucune information de ticket dans ce lien.<br>
        Ce lien doit être généré depuis l'outil de tirage au sort de L'Objectif Châlonnais.
      </div>
    `;
  } else {
    let rows = '';
    if (contest) rows += `<div class="row"><span class="k">Concours</span><span class="v">${esc(contest)}</span></div>`;
    if (prize) rows += `<div class="row"><span class="k">Lot</span><span class="v">${esc(prize)}</span></div>`;
    if (date) rows += `<div class="row"><span class="k">Date</span><span class="v">${esc(date)}</span></div>`;

    content.innerHTML = `
      <div class="ticket viewfinder">
        <span class="vf-bl"></span><span class="vf-br"></span>
        <p class="label">Gagnant</p>
        <p class="winner-name">${esc(name || '—')}</p>
        ${rows}
        ${code ? `
          <div class="code-block">
            <p class="label">Code</p>
            <p class="code-value">${esc(code)}</p>
          </div>
        ` : ''}
        <p class="status"><span class="dot"></span>Ticket valide</p>
      </div>
    `;
    footerNote.style.display = 'block';
  }
</script>
